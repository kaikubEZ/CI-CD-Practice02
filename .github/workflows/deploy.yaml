name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: If file exist
        run: |
          ls -la

      # Setup Node.js
      - name: Setup npm
        uses: actions/setup-node@v6
        # with:
        #   node-version: '18'

      - name: Testing
        run: |
          echo "Testing CI/CD pipeline"

      - name: Install dependencies
        run: |
          npm i

      - name: Build the project
        run: |  
          npm run build